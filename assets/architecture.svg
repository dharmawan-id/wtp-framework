<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 640" font-family="Archivo, Arial, Helvetica, sans-serif" role="img" aria-label="WTP Framework architecture: a demand and supply mirror">
  <rect width="1040" height="640" fill="#efe7d6"/>

  <!-- Premise bar -->
  <rect x="46" y="34" width="948" height="56" fill="#0b0c0d"/>
  <text x="520" y="69" text-anchor="middle" fill="#efe7d6" font-size="19" font-weight="800" letter-spacing="0.5">PREMISE: people pay to move from a worse state to a better one</text>

  <!-- Column headers -->
  <text x="60" y="128" fill="#0b0c0d" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" letter-spacing="2">DEMAND SIDE / THE BUYER</text>
  <text x="980" y="128" text-anchor="end" fill="#0b0c0d" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" letter-spacing="2">SUPPLY SIDE / THE SELLER</text>

  <!-- ===== DEMAND column (left) ===== -->
  <!-- 13 Drivers -->
  <rect x="65" y="150" width="400" height="62" fill="#0b0c0d"/>
  <rect x="60" y="145" width="400" height="62" fill="#8b2332" stroke="#0b0c0d" stroke-width="3"/>
  <text x="80" y="178" fill="#efe7d6" font-size="20" font-weight="800">13 DRIVERS</text>
  <text x="80" y="197" fill="#efe7d6" font-family="JetBrains Mono, monospace" font-size="12">why they pay</text>

  <!-- 17 Amplifiers -->
  <rect x="65" y="226" width="400" height="62" fill="#0b0c0d"/>
  <rect x="60" y="221" width="400" height="62" fill="#c9a227" stroke="#0b0c0d" stroke-width="3"/>
  <text x="80" y="254" fill="#0b0c0d" font-size="20" font-weight="800">17 AMPLIFIERS</text>
  <text x="80" y="273" fill="#0b0c0d" font-family="JetBrains Mono, monospace" font-size="12">how hard, how fast, how long</text>

  <!-- Cognitive bypass -->
  <rect x="60" y="297" width="400" height="46" fill="#f5efe0" stroke="#0b0c0d" stroke-width="3"/>
  <text x="80" y="319" fill="#0b0c0d" font-size="15" font-weight="800">COGNITIVE BYPASS</text>
  <text x="80" y="335" fill="#3a362f" font-family="JetBrains Mono, monospace" font-size="11">biases that skip emotion</text>

  <!-- Inhibitors -->
  <rect x="65" y="358" width="400" height="62" fill="#0b0c0d"/>
  <rect x="60" y="353" width="400" height="62" fill="#efe7d6" stroke="#8b2332" stroke-width="3"/>
  <text x="80" y="386" fill="#8b2332" font-size="20" font-weight="800">INHIBITORS</text>
  <text x="80" y="405" fill="#3a362f" font-family="JetBrains Mono, monospace" font-size="12">the brakes: why they do not pay</text>

  <!-- Magnitude -->
  <rect x="60" y="429" width="400" height="46" fill="#9c6b35" stroke="#0b0c0d" stroke-width="3"/>
  <text x="80" y="451" fill="#efe7d6" font-size="15" font-weight="800">MAGNITUDE</text>
  <text x="80" y="467" fill="#efe7d6" font-family="JetBrains Mono, monospace" font-size="11">how much</text>

  <!-- ===== SUPPLY column (right) ===== -->
  <!-- 13 Value propositions -->
  <rect x="585" y="150" width="400" height="62" fill="#0b0c0d"/>
  <rect x="580" y="145" width="400" height="62" fill="#c9a227" stroke="#0b0c0d" stroke-width="3"/>
  <text x="600" y="178" fill="#0b0c0d" font-size="20" font-weight="800">13 VALUE PROPOSITIONS</text>
  <text x="600" y="197" fill="#0b0c0d" font-family="JetBrains Mono, monospace" font-size="12">what to position</text>

  <!-- 26 Tactics -->
  <rect x="585" y="226" width="400" height="62" fill="#0b0c0d"/>
  <rect x="580" y="221" width="400" height="62" fill="#123047" stroke="#0b0c0d" stroke-width="3"/>
  <text x="600" y="254" fill="#efe7d6" font-size="20" font-weight="800">26 ACTIVATION TACTICS</text>
  <text x="600" y="273" fill="#efe7d6" font-family="JetBrains Mono, monospace" font-size="12">what to deploy</text>

  <!-- mirror note -->
  <rect x="580" y="353" width="400" height="122" fill="#f5efe0" stroke="#0b0c0d" stroke-width="3"/>
  <text x="600" y="385" fill="#0b0c0d" font-size="15" font-weight="800">THE MIRROR</text>
  <text x="600" y="410" fill="#3a362f" font-family="JetBrains Mono, monospace" font-size="12">each driver has a matching</text>
  <text x="600" y="428" fill="#3a362f" font-family="JetBrains Mono, monospace" font-size="12">value proposition; each amplifier</text>
  <text x="600" y="446" fill="#3a362f" font-family="JetBrains Mono, monospace" font-size="12">and bias has matching tactics.</text>

  <!-- mirror arrows -->
  <g stroke="#0b0c0d" stroke-width="3" fill="#0b0c0d">
    <line x1="465" y1="176" x2="575" y2="176"/>
    <polygon points="575,176 563,170 563,182"/>
    <line x1="465" y1="252" x2="575" y2="252"/>
    <polygon points="575,252 563,246 563,258"/>
  </g>

  <!-- Footer bar -->
  <rect x="46" y="505" width="948" height="100" fill="#0b0c0d"/>
  <text x="520" y="535" text-anchor="middle" fill="#c9a227" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" letter-spacing="2">WRAPPED AROUND BOTH SIDES</text>
  <text x="180" y="572" text-anchor="middle" fill="#efe7d6" font-size="17" font-weight="800">DYNAMICS</text>
  <text x="180" y="590" text-anchor="middle" fill="#a59c88" font-family="JetBrains Mono, monospace" font-size="10">journey + feedback</text>
  <text x="406" y="572" text-anchor="middle" fill="#efe7d6" font-size="17" font-weight="800">CONTEXT</text>
  <text x="406" y="590" text-anchor="middle" fill="#a59c88" font-family="JetBrains Mono, monospace" font-size="10">B2B, culture, situation</text>
  <text x="640" y="572" text-anchor="middle" fill="#efe7d6" font-size="17" font-weight="800">APPLICATION</text>
  <text x="640" y="590" text-anchor="middle" fill="#a59c88" font-family="JetBrains Mono, monospace" font-size="10">method, filters, decision tree</text>
  <text x="868" y="572" text-anchor="middle" fill="#efe7d6" font-size="17" font-weight="800">BOUNDARIES</text>
  <text x="868" y="590" text-anchor="middle" fill="#a59c88" font-family="JetBrains Mono, monospace" font-size="10">limits + ethics</text>
</svg>
