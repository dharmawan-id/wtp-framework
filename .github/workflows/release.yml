name: Release

# W-13 release pipeline (BUILD ENGINE v2). Conventional release via Changesets:
# a "Version Packages" PR is opened from pending changesets; merging it publishes
# the changed packages (wtp-mcp, wtp-apply) to npm via OIDC Trusted Publishing.
# No long-lived NPM_TOKEN is stored. Provenance attestations are emitted automatically.

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions: {}

jobs:
  release:
    name: Release and Publish
    runs-on: ubuntu-latest
    # Gated off until the first manual npm publish + Trusted Publishing setup is done.
    # changesets/action attempts to publish unpublished packages on every push to main,
    # which fails with E404 before the packages exist on npm. Set the repository variable
    # RELEASE_ENABLED=true (Settings > Secrets and variables > Actions > Variables) once
    # the trusted publisher is configured, and this pipeline goes live.
    if: ${{ vars.RELEASE_ENABLED == 'true' }}
    permissions:
      contents: write
      pull-requests: write
      id-token: write # required for npm OIDC trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Changesets needs full history

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Use npm with trusted publishing support
        run: npm install -g npm@latest # provenance/OIDC needs npm >= 11.5.1

      - name: Install dependencies
        run: npm install

      - name: Create Release PR or publish to npm
        uses: changesets/action@v1
        with:
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
