name: checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Drift check (single sources of truth stay in sync)
        run: node scripts/check-drift.mjs

      - name: No em-dash in shipped files
        run: |
          if grep -rn "—" --include="*.md" --include="*.mjs" --include="*.html" --include="*.svg" --exclude-dir=node_modules . ; then
            echo "::error::Em-dash found in shipped files (use a comma, colon, or rephrase)."
            exit 1
          fi
          echo "No em-dash found."

  supply-chain:
    # W-14 per-release gate (BUILD ENGINE v2): dependency audit + SAST on the package code.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: npm audit (workspace deps, fail on high/critical)
        run: |
          npm install --package-lock-only --ignore-scripts
          npm audit --audit-level=high

      - name: Semgrep SAST (report-only on first wiring; flip to --error once green)
        run: |
          python -m pip install --quiet semgrep
          semgrep --config p/security-audit --config p/secrets --exclude node_modules --metrics off .
